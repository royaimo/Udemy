<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Metadatos -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Roy Aimo">
    <meta name="description" content="Desarrollo blog de café">
    <meta name="keywords" content="blog, café, html, css">
    <!-- Título -->
    <title>Blog de Café</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="img/cup-hot-fill.svg" alt="Icono Blog Café">
    <!-- Boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <!-- Iconos de Boostrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=PT+Sans:wght@400;700&display=swap"
        rel="stylesheet">

</head>


<body>
    <!-- header -->
    <header class="contenedor  imagen_header ">
        <div class="header_overlay">
            <div class="header_navegacion">
                <a href="index.html">
                    <h1>Blog<span>deCafé</span></h1>
                </a>
                <nav>
                    <a href="nosotros.html">Nosotros</a>
                    <a href="cursos.html">Cursos</a>
                    <a href="contacto.html">Contacto</a>
                </nav>
            </div>
            <div class="header_titulo">
                <h3>Blog de café con consejos y cursos</h3>
                <p>Aprende de los expertos con las mejores recetas y consejos</p>
            </div>
        </div>
    </header>

    <!-- main -->
    <section class="contenerdor_contacto">
        <div class="parte1">
            <div class="contacto_titulo">
                <h3>Contacto</h3>
            </div>
            <div class="contacto_img"> </div>
        </div>
        <div class="parte2">
            <form class="contacto_formulario" action="contacto.html" method="post">
                <div class="campo_formulario">
                    <label class="label_formulario" for="nombre">Nombre</label>
                    <input class="boton_formulario" type="text" name="nombre" id="nombre" placeholder="Tu nombre">
                </div>
                <div class="campo_formulario">
                    <label class="label_formulario" for="apellido">Apellido</label>
                    <input class="boton_formulario" type="text" name="apellido" id="apellido" placeholder="Tu Apellido">
                </div>
                <div class="campo_formulario">
                    <label class="label_formulario" for="email">Email</label>
                    <input class="boton_formulario" type="email" name="email" id="email" placeholder="Tu Email">
                </div>
                <div class="campo_formulario">
                    <label class="label_formulario" for="mensaje">Mensaje</label>
                    <textarea class="boton_formulario" name="mensaje" id="mensaje" cols="30" rows="4"></textarea>
                </div>
                <div class="alinear_boton-submit">
                    <a href="contacto.html">
                        <button type="button"
                            class="btn btn-dark my-4 fs-3 py-4 px-5 boton_formulario-submit">ENVIAR</button>
                    </a>
                </div>
            </form>
        </div>
    </section>


    <!-- footer -->
    <footer class="contenedor w-100">
        <div class="footer_overlay">
            <div class="footer_enlace">
                <a href="index.html" class="footer_titutlo">
                    <h1>Blog<span>deCafé</span></h1>
                </a>
                <nav class="footer_nav">
                    <a href="nosotros.html">Nosotros</a>
                    <a href="cursos.html">Cursos</a>
                    <a href="contacto.html">Contacto</a>
                </nav>
            </div>
        </div>
    </footer>


    <!-- Script Boostrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
